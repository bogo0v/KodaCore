name: Java CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    
uses: actions/checkout@v2
name: Set up JDK 8
  uses: actions/setup-java@v2
  with:
    java-version: '8'
    distribution: 'adopt'
name: Build with Gradle
run: chmod +x gradlew && ./gradlew build
name: Upload Artifact
uses: actions/upload-artifact@v2
with:
  name: KodaMod
  path: build/libs/*.jar
