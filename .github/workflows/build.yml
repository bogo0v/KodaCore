name: Build Koda Core
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 8
        uses: actions/setup-java@v3
        with:
          java-version: &#039;8&#039;
          distribution: &#039;temurin&#039;
      - name: Grant Permission
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build
      - name: Upload
        uses: actions/upload-artifact@v3
        with:
          name: Koda-Final-Jar
          path: build/libs/*.jar
